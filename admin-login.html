<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Neobium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #151a28;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --danger: #ef4444;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #2d3748;
            background: #1a202c;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .error { color: var(--danger); font-size: 0.9rem; text-align: center; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="javascript:history.back()" style="color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; font-weight: 500;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back
        </a>
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Login to CMS</button>
            <div class="error" id="errorMsg">Invalid email or password.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (!res.ok && res.status !== 401) {
                    throw new Error('API not available');
                }
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('neobium_admin', 'true');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    document.getElementById('errorMsg').innerText = data.message || 'Invalid email or password.';
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                console.warn("Backend login failed, using local fallback for static hosting:", err);
                
                // Fallback for static hosting (e.g. GitHub Pages)
                if (email !== 'business.neobium@gmail.com') {
                    document.getElementById('errorMsg').innerText = 'Email wrong';
                    document.getElementById('errorMsg').style.display = 'block';
                } else if (password !== 'Flynv245$#@@#$') {
                    document.getElementById('errorMsg').innerText = 'Password wrong';
                    document.getElementById('errorMsg').style.display = 'block';
                } else {
                    localStorage.setItem('neobium_admin', 'true');
                    window.location.href = 'admin-dashboard.html';
                }
            }
        });

        // Check if already logged in (optimistic frontend check)
        if(localStorage.getItem('neobium_admin') === 'true') {
            // We could verify session with backend here, but redirecting to dashboard is fine
            // since dashboard relies on APIs that will fail if unauthenticated.
            // But let's just let the user stay here if they want to re-login.
        }
    </script>
</body>
</html>
